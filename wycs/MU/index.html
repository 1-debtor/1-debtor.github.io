<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Player</title>
<link rel="stylesheet" href="styles/main.css">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white flex flex-col justify-between">

  <div class="song-and-lyrics flex">
    <!-- Song List -->
    <div class="scrollable-list p-4 overflow-auto" style="border-right: 3px solid rgb(82, 127, 149); flex: 1;">
      <ul id="songList">
        <!-- Songs will be populated by JavaScript -->
      </ul>
    </div>
  
    <!-- Lyrics Display -->
    <div class="w-4/5 p-4 overflow-auto" style="flex: 4;">
      <div id="lyrics" class="lyrics">
        <!-- Lyrics will be shown here -->
      </div>
    </div>
  </div>

  <div class="player-controls">
    <!-- Player Controls -->
    <div class="flex items-center p-4 bg-gray-900">
      <button id="playPauseBtn" class="bg-gray-800 hover:bg-gray-700 p-2 rounded-full mr-4">
        <img src="https://img.icons8.com/ios-filled/50/ffffff/play--v1.png" alt="Play" class="w-6 h-6">
      </button>
      <!-- Volume Control with modified width and position -->
      <input type="range" id="volumeControl" min="0" max="100" value="100" style="width: 20%;" class="mr-4">
      <!-- Progress Bar with modified width and position -->
      <input type="range" id="progressBar" min="0" value="0" style="width: 40%; cursor: pointer;">
      <span id="progressTime">0:00</span>
    </div>
  </div>

<!-- Invisible Audio Player -->
<audio id="audioPlayer" controls style="display:none;"></audio>
<div id="authorName" class="text-right pr-4 pb-2">BY-DEBTOR</div>
<!-- Scripts -->
<script src="scripts/main.js"></script>
</body>
</html>
