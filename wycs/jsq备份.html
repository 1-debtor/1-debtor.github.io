<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>正计时</title>
<style>
  body, html {
    height: 100%;
    margin: 0;
    font-family: 'KaiTi', '楷体', serif;
    background-image: url('https://cdn.jsdelivr.net/gh/1-debtor/tuchuang/tuchuang/202402010057751.jpg');
    background-size: 80%;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
  }
  .background-overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.2);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
  }
  .title {
    color: white;
    font-size: 64px; /* Increased font size for the title */
    margin-bottom: 20px; /* Ensure spacing between title and timer */
  }
  .timer, .extended-timer {
    color: white;
    font-size: 32px;
    background-color: rgba(0, 0, 0, 0.8);
    padding: 20px;
    border-radius: 10px;
    margin-top: 20px;
  }
</style>
</head>
<body>

<div class="background-overlay">
  <div class="title">JWJ&XYC  </div>
  <div class="timer" id="timer"></div>
  <div class="extended-timer" id="extendedTimer" style="display: none;"></div>
</div>

<script>
  function updateTime() {
    const startDate = new Date('2022-08-20T00:00:00');
    const now = new Date();
    const elapsed = now - startDate;
    const elapsedDate = new Date(elapsed);
    const days = Math.floor(elapsed / (1000 * 60 * 60 * 24));
    const hours = elapsedDate.getUTCHours();
    const minutes = elapsedDate.getUTCMinutes();
    const seconds = elapsedDate.getUTCSeconds();
    document.getElementById('timer').textContent = `${days}天 ${hours}小时 ${minutes}分钟 ${seconds}秒`;
    
    // Check if elapsed time is more than a year
    const years = elapsedDate.getUTCFullYear() - 1970; // Since epoch is 1970
    if (years > 0) {
      document.getElementById('extendedTimer').style.display = 'block';
      document.getElementById('extendedTimer').textContent = `${years}年 ${elapsedDate.getUTCMonth()}月 ${elapsedDate.getUTCDate() - 1}日 ${hours}小时 ${minutes}分钟 ${seconds}秒`;
    } else {
      document.getElementById('extendedTimer').style.display = 'none';
    }
  }
  setInterval(updateTime, 1000);
</script>

</body>
</html>
