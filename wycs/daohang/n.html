<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <!-- 以下meta标签用于自动重定向到指定的URL，这里设置的是在页面加载后立即（0秒后）跳转 -->
    <meta http-equiv="refresh" content="0; url=https://ccvener.github.io/">
</head>
<body>
    <!-- 这里可以添加一些文字或者加载指示器，告诉用户正在重定向 -->
    <p>If you are not redirected, <a href="https://ccvener.github.io/">click here</a>.</p>
</body>
</html>
